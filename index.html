<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diksha's Study Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;800&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#FDF6EC;--ink:#2E2A3B;--teal:#0FA3A3;--teal-dark:#0B7C7C;--orange:#FF8C42;
--berry:#C94F7C;--lilac:#9B8CFF;--shadow:0 4px 0 rgba(46,42,59,.14)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;
 background-image:radial-gradient(circle at 15% 10%,rgba(15,163,163,.08) 0 90px,transparent 91px),
 radial-gradient(circle at 85% 25%,rgba(255,140,66,.10) 0 70px,transparent 71px)}
h1,h2{font-family:'Baloo 2',cursive}
.wrap{max-width:560px;margin:0 auto;padding:22px 16px 60px}
header{text-align:center;margin-bottom:20px}
header .emo{font-size:52px}
header h1{font-size:30px;color:var(--teal-dark)}
header p{font-weight:800;color:var(--berry);font-size:13px}
h2{font-size:18px;margin:20px 0 10px;color:var(--ink)}
a.subject{display:flex;align-items:center;gap:14px;background:#fff;border-radius:18px;box-shadow:var(--shadow);
 padding:16px;margin-bottom:12px;text-decoration:none;color:var(--ink);transition:transform .1s;border-left:8px solid var(--teal)}
a.subject:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(46,42,59,.14)}
a.subject .ico{font-size:34px}
a.subject b{font-family:'Baloo 2';font-size:18px}
a.subject .d{font-size:12px;font-weight:700;color:#8A8496;display:block}
a.subject.maths{border-left-color:var(--orange)}
a.subject.special{border-left-color:var(--berry)}
a.subject.soon{border-left-color:#C9C2DB;opacity:.6;pointer-events:none}
.test{display:flex;align-items:center;gap:12px;background:#fff;border-radius:14px;box-shadow:var(--shadow);padding:12px 14px;margin-bottom:10px}
.test .date{background:var(--lilac);color:#fff;border-radius:12px;padding:8px 10px;text-align:center;min-width:64px;flex-shrink:0}
.test .date .d{font-family:'Baloo 2';font-size:20px;font-weight:800;line-height:1}
.test .date .m{font-size:10px;font-weight:800;text-transform:uppercase}
.test .info b{font-size:15px}
.test .info .t{font-size:12px;font-weight:700;color:#8A8496;display:block}
.test.next{border:3px solid var(--orange)}
.test.next .date{background:var(--orange)}
.test .badge{margin-left:auto;background:#FFF3E6;color:#E56E22;font-size:10px;font-weight:800;border-radius:99px;padding:4px 8px;white-space:nowrap}
.test.past{opacity:.45}
footer{text-align:center;font-size:11px;font-weight:700;color:#A79FB8;margin-top:24px}
</style>
</head>
<body>
<div class="wrap">
<header>
  <div class="emo">🎒</div>
  <h1>Diksha's Study Hub</h1>
  <p>Class 4 · Practice · Play · Learn</p>
</header>

<h2>📚 My Subjects</h2>
<div id="subjects"></div>

<h2>🏫 Special Classes</h2>
<div id="special"></div>

<h2>🗓️ Upcoming Tests</h2>
<div id="tests"></div>

<footer>Made with ❤️ by Papa &amp; Pixel the Robot</footer>
</div>

<script>
"use strict";
/* =====================================================================
   EDIT HERE — Rakesh: this is the only part you need to change.
   1) SUBJECTS: set href to the app file name in this repo (or full URL).
      Set href to "" to show a greyed-out "coming soon" card.
   2) TESTS: add rows as {date:"YYYY-MM-DD", subject:"...", topic:"..."}.
      Past tests fade out automatically; the next test gets highlighted.
===================================================================== */
const SUBJECTS = [
  { icon:"💻", name:"Computer Science", desc:"Unit 1: Computer System + Scratch", href:"computer-science.html", cls:"" },
  { icon:"🔢", name:"Mathematics", desc:"Addition, subtraction, multiplication, division, place value & word problems", href:"mathsquest.html", cls:"maths" },
  { icon:"📜", name:"Sanskrit", desc:"लिंग, वचन, दिन, पशु और क्रियाएँ — Class 4, Unit 1", href:"sanskritquest.html", cls:"" }
];
const SPECIAL_CLASSES = [
  { icon:"🏫", name:"Maths", desc:"July special class: big numbers, factors & multiples, Roman numerals, BODMAS", href:"special-classes-maths.html", cls:"special" },
  { icon:"🔬", name:"Science", desc:"Coming soon", href:"", cls:"" }
];
const TESTS = [
  { date:"2026-07-13", subject:"Computer Science", topic:"Unit 1: Computer System & Scratch Coding" }
  /* add more like:
  { date:"2026-07-20", subject:"Mathematics", topic:"Unit 1: Large Numbers" },
  */
];
/* ============================ end of edit zone ====================== */

const MONTHS=["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
const DATE_FMT_OPTS={weekday:"long"};

const subEl=document.getElementById("subjects");
subEl.innerHTML=SUBJECTS.map(s=>{
  const cls="subject "+s.cls+(s.href?"":" soon");
  return '<a class="'+cls+'" href="'+(s.href||"#")+'"><span class="ico">'+s.icon+'</span><span><b>'+s.name+'</b><span class="d">'+s.desc+'</span></span></a>';
}).join("");

const specEl=document.getElementById("special");
specEl.innerHTML=SPECIAL_CLASSES.map(s=>{
  const cls="subject "+s.cls+(s.href?"":" soon");
  return '<a class="'+cls+'" href="'+(s.href||"#")+'"><span class="ico">'+s.icon+'</span><span><b>'+s.name+'</b><span class="d">'+s.desc+'</span></span></a>';
}).join("");

const now=new Date(); now.setHours(0,0,0,0);
const rows=TESTS.map(t=>{
  const d=new Date(t.date+"T00:00:00");
  return {t:t, d:d, days:Math.round((d-now)/86400000)};
}).sort((a,b)=>a.d-b.d);
let nextFound=false;
document.getElementById("tests").innerHTML = rows.length ? rows.map(r=>{
  const past=r.days<0;
  let cls="test"+(past?" past":"");
  let badge="";
  if(!past && !nextFound){cls+=" next";nextFound=true;
    badge=r.days===0?"TODAY!":r.days===1?"Tomorrow!":"In "+r.days+" days";}
  const weekday=r.d.toLocaleDateString("en-IN",DATE_FMT_OPTS);
  return '<div class="'+cls+'"><div class="date"><div class="d">'+r.d.getDate()+'</div><div class="m">'+MONTHS[r.d.getMonth()]+'</div></div>'+
    '<div class="info"><b>'+r.t.subject+'</b><span class="t">'+r.t.topic+' · '+weekday+'</span></div>'+
    (badge?'<span class="badge">'+badge+'</span>':'')+'</div>';
}).join("") : '<div class="test"><div class="info"><b>No tests scheduled</b><span class="t">Enjoy the break! 🎈</span></div></div>';
</script>
</body>
</html>
